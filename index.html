<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TheCase | Cyber Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-dark: #00666a;
            --bg: #050505; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --blue: #4b69ff; --purple: #8847ff; --pink: #d32ee6; --red: #eb4b4b; --gold: #ffcc00; 
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
        }

        .header { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .balance { background: var(--accent); color: black; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .case-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px; margin-bottom: 15px; 
            transition: 0.3s;
        }
        .case-card:active { transform: scale(0.98); }
        .case-card .price { color: var(--accent); font-weight: bold; margin-top: 5px; }

        /* Рулетка */
        .case-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 200; padding: 20px; box-sizing: border-box; 
        }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 30px; color: var(--accent); }

        .roulette-wrapper { 
            position: relative; width: 100%; height: 140px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 12px; overflow: hidden; margin: 40px 0; 
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .pointer { 
            position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; 
            background: var(--accent); z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px var(--accent);
        }
        .cases-line { display: flex; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); align-items: center; height: 100%; }

        .item { 
            min-width: 100px; width: 100px; height: 100px; margin: 0 8px; 
            background: rgba(255,255,255,0.05); border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-bottom: 3px solid #333;
        }
        .item img { width: 70%; height: auto; }
        
        .btn-main { 
            width: 100%; background: var(--accent); color: black; border: none; 
            padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; 
        }
        .btn-sell { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 4px; border-radius: 4px; font-size: 10px; margin-top: 5px;}

        .nav { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(10,10,10,0.9); backdrop-filter: blur(15px);
            display: flex; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; }
        .nav-item.active { color: var(--accent); }

        /* Раритетность */
        .blue { border-color: var(--blue) !important; }
        .purple { border-color: var(--purple) !important; }
        .pink { border-color: var(--pink) !important; }
        .red { border-color: var(--red) !important; }
        .gold { border-color: var(--gold) !important; }

        .inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .pool-grid { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; }
        .pool-item { min-width: 80px; background: var(--card-bg); padding: 10px; border-radius: 8px; font-size: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">THE CASE</div>
        <div class="balance" id="balanceDisplay">0 TC</div>
    </div>

    <div id="caseModal" class="case-modal">
        <div class="close-modal" onclick="closeCase()">×</div>
        <h2 id="modalTitle" style="text-align:center; margin-top:40px;">Кейс</h2>
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="line" class="cases-line"></div>
        </div>
        <button class="btn-main" id="modalSpinBtn">ОТКРЫТЬ КЕЙС</button>
        <p id="modalPrice" style="text-align:center; color:var(--accent);"></p>
        <div id="poolGrid" class="pool-grid"></div>
    </div>

    <div id="page-cases" class="page active">
        <div class="case-card" onclick="openCase('poor')">
            <h3>📦 LUCK TESTER</h3>
            <div class="price">10 TC</div>
        </div>
        <div class="case-card" onclick="openCase('norm')">
            <h3>⚡ CYBER PACK</h3>
            <div class="price">15,000 TC</div>
        </div>
        <div class="case-card" onclick="openCase('rich')">
            <h3>💎 NEON OVERLORD</h3>
            <div class="price">2,500,000 TC</div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-section" style="background:var(--card-bg); padding:15px; border-radius:12px; margin-bottom:15px;">
            <div id="userTitle" style="font-weight:bold; color:var(--accent);">USER</div>
            <div id="userIdDisplay" style="font-size:10px; color:#666;">ID: 0000</div>
        </div>
        <input type="text" id="refLink" readonly style="width:100%; background:#111; color:#555; border:none; padding:8px; font-size:10px; border-radius:5px; margin-bottom:15px;">
        <h3>ИНВЕНТАРЬ</h3>
        <div id="inventoryGrid" class="inv-grid"></div>
    </div>

    <div id="page-shop" class="page">
        <div style="text-align:center; padding:20px;">
            <h2>ПОПОЛНЕНИЕ</h2>
            <input type="number" id="starsIn" value="10" oninput="calcNC()" style="width:80%; padding:10px; background:#111; color:white; border:1px solid var(--accent); border-radius:8px; text-align:center; font-size:20px;">
            <p>Вы получите: <span id="ncOut" style="color:var(--accent)">1000</span> TC</p>
            <button class="btn-main" onclick="topUp()">ОПЛАТИТЬ ЧЕРЕЗ STARS</button>
        </div>
    </div>

    <nav class="nav">
        <div id="nav-cases" class="nav-item active" onclick="nav('cases')">КЕЙСЫ</div>
        <div id="nav-profile" class="nav-item" onclick="nav('profile')">ИНВЕНТАРЬ</div>
        <div id="nav-shop" class="nav-item" onclick="nav('shop')">МАГАЗИН</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SERVER_URL = 'https://notcasecs2.onrender.com'; 
        let balance = 0;
        let inventory = JSON.parse(localStorage.getItem('tc_inv')) || [];

        const skins = {
            empty: { name: "Ничего", color: "empty", img: "not.png", price: 0 },
            shirp1: { name: "Glock | Night", color: "blue", img: "shirp1.png", price: 10 },
            shirp2: { name: "USP-S | Forest", color: "blue", img: "shirp2.png", price: 15 },
            ak: { name: "AK-47 | Redline", color: "red", img: "ak.png", price: 120000 },
            knife: { name: "Karambit | Doppler", color: "gold", img: "knife.png", price: 2500000 }
        };

        const config = {
            poor: { title: "Luck Tester", price: 10, pool: [skins.shirp1], rare: skins.knife, chance: 0.01 },
            norm: { title: "Cyber Pack", price: 15000, pool: [skins.shirp1, skins.shirp2], rare: skins.ak, chance: 1 },
            rich: { title: "Neon Overlord", price: 2500000, pool: [skins.ak], rare: skins.knife, chance: 5 }
        };

        function nav(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        function openCase(type) {
            let c = config[type];
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalPrice').innerText = `Стоимость: ${c.price.toLocaleString()} TC`;
            document.getElementById('modalSpinBtn').onclick = () => startSpin(c.price, type);
            
            const pGrid = document.getElementById('poolGrid');
            pGrid.innerHTML = '';
            [...c.pool, c.rare].forEach(s => {
                pGrid.innerHTML += `<div class="pool-item ${s.color}">${s.name}</div>`;
            });

            document.getElementById('caseModal').style.display = 'block';
            const line = document.getElementById('line');
            line.style.transition = 'none';
            line.style.transform = 'translateX(0)';
            line.innerHTML = '<div class="item"></div>'.repeat(10);
        }

        function startSpin(price, type) {
            if (balance < price) return tg.showAlert("Недостаточно средств!");
            
            const btn = document.getElementById('modalSpinBtn');
            if(btn.disabled) return;
            btn.disabled = true;

            balance -= price; 
            updateUI();
            fastSaveBalance();

            const line = document.getElementById('line');
            line.innerHTML = '';

            let c = config[type];
            let roll = Math.random() * 100;
            let win = (roll <= c.chance) ? c.rare : c.pool[Math.floor(Math.random() * c.pool.length)];
            
            // Логика "Ничего" для дешевого кейса
            if (type === 'poor' && roll > 5) win = skins.empty;

            const totalItems = 60;
            const winIndex = 50;

            for(let i=0; i<totalItems; i++) {
                let s = (i === winIndex) ? win : (Math.random() > 0.1 ? c.pool[0] : c.rare);
                line.innerHTML += `<div class="item ${s.color}"><img src="${s.img}" onerror="this.src='not.png'"></div>`;
            }

            setTimeout(() => {
                line.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                const itemWidth = 116; 
                const finalPosition = (winIndex * itemWidth) - (window.innerWidth / 2) + 58;
                line.style.transform = `translateX(-${finalPosition}px)`;
            }, 50);

            setTimeout(() => {
                if (win.name !== "Ничего") {
                    inventory.push(win);
                    localStorage.setItem('tc_inv', JSON.stringify(inventory));
                    tg.showAlert(`Поздравляем! Вы выбили: ${win.name}`);
                } else {
                    tg.showAlert("Пусто! Повезет в следующий раз.");
                }
                btn.disabled = false;
                updateUI();
            }, 5500);
        }

        function closeCase() { document.getElementById('caseModal').style.display = 'none'; }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " TC";
            const grid = document.getElementById('inventoryGrid');
            grid.innerHTML = '';
            inventory.forEach((item, i) => {
                grid.innerHTML += `<div class="item ${item.color}">
                    <img src="${item.img}" style="width:50px">
                    <button class="btn-sell" onclick="sellItem(${i})">${item.price} TC</button>
                </div>`;
            });
        }

        function sellItem(i) {
            balance += inventory[i].price;
            inventory.splice(i, 1);
            localStorage.setItem('tc_inv', JSON.stringify(inventory));
            updateUI();
            fastSaveBalance();
        }

        function calcNC() {
            let v = document.getElementById('starsIn').value;
            document.getElementById('ncOut').innerText = (v * 100).toLocaleString();
        }

        async function fastSaveBalance() {
            try {
                await fetch(`${SERVER_URL}/update-balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, balance: balance })
                });
            } catch(e) {}
        }

        async function syncWithServer() {
            const user = tg.initDataUnsafe.user;
            if(!user) return;
            try {
                const res = await fetch(`${SERVER_URL}/sync-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id, username: user.username })
                });
                const data = await res.json();
                balance = data.balance;
                updateUI();
            } catch(e) {}
        }

        function init() {
            if(tg.initDataUnsafe?.user) {
                const u = tg.initDataUnsafe.user;
                document.getElementById('userTitle').innerText = "👤 " + u.first_name;
                document.getElementById('userIdDisplay').innerText = "ID: " + u.id;
                document.getElementById('refLink').value = "https://t.me/thecase_bot?start=" + u.id;
                syncWithServer();
            }
            updateUI();
        }
        init();
    </script>
</body>
</html>
