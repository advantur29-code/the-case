<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TC | Neon Cases</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            /* Редкости */
            --rarity-blue: #4b69ff;
            --rarity-red: #eb4b4b;
            --rarity-gold: #ffcc00;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #0a0a0c 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-bottom: 100px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header & Balance */
        .header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            background: rgba(10, 10, 12, 0.7);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-size: 1.2rem;
            font-weight: 800; 
            background: linear-gradient(90deg, #00f2ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .balance-pill {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 6px 15px;
            border-radius: 50px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* Контент страниц */
        .page { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Кейсы */
        .case-grid { display: grid; gap: 15px; }
        .case-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
        }
        .case-item:active { transform: scale(0.96); border-color: var(--accent); }
        .case-item h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .case-item .price-tag { color: var(--accent); font-weight: 800; opacity: 0.9; }

        /* Рулетка Модал */
        .modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(5, 5, 5, 0.95); z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .roulette-container {
            position: absolute; top: 40%; left: 0; width: 100%;
            height: 160px; overflow: hidden;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .pointer {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 3px;
            background: var(--accent); transform: translateX(-50%);
            z-index: 50; box-shadow: 0 0 20px var(--accent);
        }

        .track { 
            display: flex; height: 100%; align-items: center; 
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .slot {
            min-width: 120px; height: 120px; margin: 0 5px;
            background: rgba(255,255,255,0.03); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 4px solid #333;
        }

        /* Навигация */
        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 65px; background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(20px); border-radius: 25px;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-around;
            z-index: 999;
        }

        .nav-btn { 
            opacity: 0.4; transition: 0.3s; font-size: 0.7rem; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .nav-btn.active { opacity: 1; color: var(--accent); }
        
        /* Кнопки */
        .main-btn {
            background: var(--accent); color: #000; border: none;
            padding: 18px; border-radius: 16px; width: 100%;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        }
        .main-btn:disabled { opacity: 0.3; }

        /* Стили редкостей */
        .blue { border-color: var(--rarity-blue) !important; color: var(--rarity-blue); }
        .red { border-color: var(--rarity-red) !important; color: var(--rarity-red); }
        .gold { border-color: var(--rarity-gold) !important; color: var(--rarity-gold); text-shadow: 0 0 10px rgba(255,204,0,0.3); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">THE CASE <span style="font-weight: 300; font-size: 0.8rem;">OS</span></div>
        <div class="balance-pill" id="balanceVal">0 TC</div>
    </div>

    <div id="rouletteModal" class="modal">
        <div style="padding: 20px; text-align: center;">
            <h2 id="mName">Box</h2>
            <div class="roulette-container">
                <div class="pointer"></div>
                <div id="track" class="track"></div>
            </div>
            <div style="margin-top: 200px;">
                <button class="main-btn" id="spinBtn" onclick="handleSpin()">Открыть</button>
                <p onclick="closeModal()" style="margin-top: 15px; opacity: 0.5;">Закрыть</p>
            </div>
        </div>
    </div>

    <div id="p-cases" class="page active">
        <div class="case-grid">
            <div class="case-item" onclick="initBox('poor')">
                <h3>📦 LUCK TESTER</h3>
                <div class="price-tag">10 TC</div>
            </div>
            <div class="case-item" onclick="initBox('norm')">
                <h3>⚡ CYBER PACK</h3>
                <div class="price-tag">15,000 TC</div>
            </div>
            <div class="case-item" onclick="initBox('rich')">
                <h3>💎 NEON OVERLORD</h3>
                <div class="price-tag">2,500,000 TC</div>
            </div>
        </div>
    </div>

    <div id="p-inv" class="page">
        <h3>Инвентарь</h3>
        <div id="invGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="show('cases', this)"><span>КЕЙСЫ</span></div>
        <div class="nav-btn" onclick="show('inv', this)"><span>СКЛАД</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = 0;
        let inv = JSON.parse(localStorage.getItem('tc_inv')) || [];
        let currentType = null;

        const items = {
            s1: { name: "Glock | Night", color: "blue", price: 10 },
            s2: { name: "USP-S | Forest", color: "blue", price: 15 },
            ak: { name: "AK-47 | Redline", color: "red", price: 120000 },
            knife: { name: "Karambit", color: "gold", price: 2500000 }
        };

        const boxes = {
            poor: { name: "Luck Tester", cost: 10, pool: [items.s1], rare: items.knife, chance: 1 },
            norm: { name: "Cyber Pack", cost: 15000, pool: [items.s1, items.s2], rare: items.ak, chance: 10 },
            rich: { name: "Neon Overlord", cost: 2500000, pool: [items.ak], rare: items.knife, chance: 5 }
        };

        function show(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + page).classList.add('active');
            el.classList.add('active');
            if(page === 'inv') renderInv();
            tg.HapticFeedback.impactOccurred('light');
        }

        function initBox(type) {
            currentType = type;
            const b = boxes[type];
            document.getElementById('mName').innerText = b.name;
            document.getElementById('spinBtn').innerText = `Открыть за ${b.cost}`;
            document.getElementById('rouletteModal').style.display = 'block';
            
            const track = document.getElementById('track');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            track.innerHTML = '<div class="slot"></div>'.repeat(10);
        }

        function handleSpin() {
            const b = boxes[currentType];
            if(balance < b.cost) return tg.showAlert("Мало TC!");

            tg.HapticFeedback.impactOccurred('medium');
            balance -= b.cost;
            updateUI();

            const track = document.getElementById('track');
            track.innerHTML = '';
            
            // Логика шанса
            const roll = Math.random() * 100;
            const win = (roll <= b.chance) ? b.rare : b.pool[Math.floor(Math.random() * b.pool.length)];

            // Создаем ленту
            const total = 50;
            const winIdx = 40;
            for(let i=0; i<total; i++) {
                const s = (i === winIdx) ? win : (Math.random() > 0.8 ? b.rare : b.pool[0]);
                track.innerHTML += `<div class="slot ${s.color}"><div style="font-size:8px;text-align:center">${s.name}</div></div>`;
            }

            setTimeout(() => {
                track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.1, 1)';
                const shift = (winIdx * 130) - (window.innerWidth / 2) + 65;
                track.style.transform = `translateX(-${shift}px)`;
            }, 50);

            document.getElementById('spinBtn').disabled = true;

            setTimeout(() => {
                inv.push(win);
                localStorage.setItem('tc_inv', JSON.stringify(inv));
                tg.HapticFeedback.notificationOccurred('success');
                tg.showAlert(`Выпало: ${win.name}`);
                document.getElementById('spinBtn').disabled = false;
                updateUI();
            }, 5500);
        }

        function renderInv() {
            const g = document.getElementById('invGrid');
            g.innerHTML = inv.map((item, i) => `
                <div class="slot ${item.color}" onclick="sell(${i})" style="min-width:auto; height:100px;">
                    <div style="font-size:9px">${item.name}</div>
                    <div style="color:var(--accent); font-size:10px">${item.price}</div>
                </div>
            `).join('');
        }

        function sell(i) {
            balance += inv[i].price;
            inv.splice(i, 1);
            localStorage.setItem('tc_inv', JSON.stringify(inv));
            renderInv();
            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function updateUI() {
            document.getElementById('balanceVal').innerText = balance.toLocaleString() + " TC";
        }

        function closeModal() {
            document.getElementById('rouletteModal').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
